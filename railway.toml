# Configuration Railway (backend)
# https://docs.railway.app/reference/config-as-code

# Build : Docker (Dockerfile). Base de données : PostgreSQL (service Railway).
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# CMD du Dockerfile : prisma migrate deploy puis node dist/main.js
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
